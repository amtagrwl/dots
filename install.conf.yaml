- clean: ["~"]

- shell:
    - command: |
        if ! brew bundle install --file Brewfile --no-upgrade; then
          echo "[brew bundle] some entries did not apply (sudo casks / mas not owned) — see 'brew bundle check' below"
        fi
      description: Installing missing Brew packages from Brewfile without upgrading existing packages...
      stdout: true
      stderr: true

- link:
    ~/.zshenv:
      force: true
      path: zshenv

    ~/.zshrc:
      force: true
      path: zshrc

    ~/.tmux.conf:
      force: true
      path: tmux.conf

    # Link Git settings managed by Dotbot (non-1Password related)
    ~/.gitconfig_dotfiles:
      force: true # or relink: true
      path: gitconfig_dotfiles

    # Public key selector for the iMac SSH host block managed by
    # scripts/ensure_1password_ssh.sh. Public key only; private key remains in 1Password.
    ~/.ssh/1password-imac-ssh.pub:
      path: config/ssh/1password-imac-ssh.pub
      create: true
      force: true

    # Link global Ruff configuration
    ~/.config/ruff/ruff.toml:
      path: config/ruff/ruff.toml
      create: true # Create parent directory (~/.config/ruff) if needed
      force: true # Overwrite if it exists

    # Link Starship configuration
    ~/.config/starship.toml:
      path: config/starship/starship.toml
      create: true # Create parent directory (~/.config) if needed
      force: true # Overwrite if it exists

    # Link Cursor settings
    "~/Library/Application Support/Cursor/User/settings.json":
      path: config/vscode/settings.json
      create: true
      force: true

    # Link Cursor keybindings
    "~/Library/Application Support/Cursor/User/keybindings.json":
      path: config/vscode/keybindings.json
      create: true
      force: true

    # Link Claude Code agent-browser skill
    ~/.agents/skills/agent-browser:
      path: config/claude-skills/agent-browser
      create: true
      force: true
    ~/.claude/skills/agent-browser:
      path: config/claude-skills/agent-browser
      create: true
      force: true

    # Link custom Claude Code skills
    ~/.claude/skills/clean-storage:
      path: config/claude-skills/clean-storage
      create: true
      force: true
    ~/.claude/skills/langfuse:
      path: config/claude-skills/langfuse
      create: true
      force: true

    # Link Claude Code global config (CLAUDE.md, settings, statusline)
    ~/.claude/CLAUDE.md:
      path: config/claude/CLAUDE.md
      create: true
      force: true
    ~/.claude/settings.json:
      path: config/claude/settings.json
      create: true
      force: true
    ~/.claude/statusline-command.sh:
      path: config/claude/statusline-command.sh
      create: true
      force: true

    # Link Codex global config (portable subset — projects/marketplaces/notify
    # are intentionally omitted so Codex can manage them per-machine)
    ~/.codex/config.toml:
      path: config/codex/config.toml
      create: true
      force: true

    # Link Codex global working-style instructions (mirrors ~/.claude/CLAUDE.md)
    ~/.codex/AGENTS.md:
      path: config/codex/AGENTS.md
      create: true
      force: true

# Shell commands to set up configurations
- shell:
    - command: chmod +x scripts/ensure_gitconfig_include.sh
      description: Make ensure_gitconfig_include script executable
      quiet: true

    - command: ./scripts/ensure_gitconfig_include.sh
      description: Ensure ~/.gitconfig includes Dotbot git settings
      stdout: true
      stderr: true

    - command: chmod +x scripts/ensure_1password_ssh.sh
      description: Make 1Password SSH script executable
      quiet: true

    - command: |
        if [ "$(uname)" = "Darwin" ]; then
          ./scripts/ensure_1password_ssh.sh
        else
          echo "Skipping 1Password SSH config as not on macOS."
        fi
      description: Point SSH at the 1Password agent (for git-over-SSH)
      stdout: true
      stderr: true

    - command: chmod +x scripts/macos_finder_settings.sh
      description: Make macOS Finder settings script executable
      quiet: true

    - command: |
        if [ "$(uname)" = "Darwin" ]; then
          ./scripts/macos_finder_settings.sh
        else
          echo "Skipping macOS Finder configuration as not on macOS."
        fi
      description: Configure macOS Finder settings
      stdout: true
      stderr: true

    - command: chmod +x scripts/macos_cursor_vim_settings.sh
      description: Make macOS Cursor Vim settings script executable
      quiet: true

    - command: |
        if [ "$(uname)" = "Darwin" ]; then
          ./scripts/macos_cursor_vim_settings.sh
        else
          echo "Skipping macOS Cursor Vim configuration as not on macOS."
        fi
      description: Configure macOS Cursor Vim key repeat settings
      stdout: true
      stderr: true

    - command: chmod +x scripts/sync_mcp_servers.sh
      description: Make MCP server sync script executable
      quiet: true

    - command: ./scripts/sync_mcp_servers.sh
      description: Sync MCP servers to Claude Code, Cursor, Codex, and VS Code
      stdout: true
      stderr: true

    - command: |
        if command -v bun >/dev/null 2>&1; then
          export PATH="$HOME/.bun/bin:$PATH"
          bun add -g agent-browser || echo "[warn] bun add agent-browser failed"
          if command -v node >/dev/null 2>&1; then
            agent-browser install || echo "[warn] agent-browser install failed"
          else
            echo "[skip] agent-browser install: node not found (bin shebang needs node)"
          fi
        else
          echo "Skipping agent-browser: bun not installed"
        fi
      description: Install agent-browser CLI and Chromium
      stdout: true
      stderr: true
