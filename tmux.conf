# tmux defaults for remote Hermes/TUI work.

# Keep Ghostty/native terminal selection usable by default. If a full-screen TUI
# captures the mouse, hold Shift while dragging in Ghostty to bypass mouse reporting.
set -g mouse off

# Let tmux copy-mode copies request the terminal clipboard via OSC 52 when the
# transport/terminal supports it. This is best-effort over mosh.
set -g set-clipboard on

# Larger scrollback for agent sessions.
set -g history-limit 50000

# vi-style copy mode; copy selection with Enter or y.
setw -g mode-keys vi
bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode Enter send-keys -X copy-selection-and-cancel
